<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>The Custom Parts Bureau — P&amp;L Dashboard</title>
<meta name="description" content="Financial Brain for Autonomous Manufacturing — Real-time P&L dashboard for AI-powered 3D printing operations.">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

/* ─── Reset & Base ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100vh;
  overflow: hidden;
  background: #0a0a0a;
  color: #c0c0c0;
  font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #00ff4140; }

/* ─── Layout ─── */
#app {
  display: grid;
  grid-template-rows: 72px 1fr 270px 26px;
  height: 100vh;
  width: 100%;
}

/* ─── Top Bar ─── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid #1a1a2e;
  background: linear-gradient(180deg, #0d1117 0%, #0a0a0a 100%);
  min-height: 72px;
  overflow: visible;
  position: relative;
  z-index: 10;
}
.brand {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.brand-name {
  font-size: 15px;
  font-weight: 700;
  color: #00ff41;
  letter-spacing: 3px;
  text-shadow: 0 0 20px #00ff4140, 0 0 40px #00ff4115;
}
.brand-sub {
  font-size: 9px;
  color: #555;
  letter-spacing: 1.5px;
  margin-top: -2px;
}
.metrics {
  display: flex;
  gap: 32px;
}
.metric {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  position: relative;
}
.metric-label {
  font-size: 9px;
  color: #555;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.metric-value {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1px;
}
.metric-value.green { color: #00ff41; text-shadow: 0 0 15px #00ff4130; }
.metric-value.cyan { color: #00d4ff; text-shadow: 0 0 15px #00d4ff30; }
.metric-value.yellow { color: #ffd700; text-shadow: 0 0 15px #ffd70030; }
.metric-spark {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 16px;
  margin-top: 2px;
}
.metric-spark .bar {
  width: 4px;
  background: #00d4ff40;
  border-radius: 1px;
  transition: height 0.3s ease;
}

/* ─── Main Content ─── */
.main-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  overflow: hidden;
  border-bottom: 1px solid #1a1a2e;
}

/* ─── Panel Shared ─── */
.panel {
  border-right: 1px solid #1a1a2e;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel:last-child { border-right: none; }
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid #1a1a2e;
  background: #0d1117;
  flex-shrink: 0;
}
.panel-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #00d4ff;
  text-transform: uppercase;
}
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

/* ─── Kanban Queue ─── */
.kanban {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 8px;
  height: 100%;
}
.kanban-col {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.kanban-col-header {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 8px 8px 6px;
  text-transform: uppercase;
  border-bottom: 2px solid;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.kanban-col-header .count {
  font-size: 10px;
  font-weight: 400;
  opacity: 0.6;
}
.col-paid .kanban-col-header { color: #ffd700; border-color: #ffd700; }
.col-printing .kanban-col-header { color: #00d4ff; border-color: #00d4ff; }
.col-completed .kanban-col-header { color: #00ff41; border-color: #00ff41; }
.col-hold .kanban-col-header { color: #ff4444; border-color: #ff4444; }

.kanban-cards {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* ─── Job Card ─── */
.job-card {
  background: #111;
  border: 1px solid #1a1a2e;
  border-radius: 4px;
  padding: 8px 10px;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
}
.job-card:hover {
  border-color: #00d4ff60;
  background: #0d1117;
  transform: translateY(-1px);
  box-shadow: 0 2px 12px #00d4ff10;
}
.job-card.selected {
  border-color: #00d4ff;
  background: #0a1628;
  box-shadow: 0 0 12px #00d4ff20, inset 0 0 20px #00d4ff05;
}
.job-card .filename {
  font-size: 11px;
  font-weight: 600;
  color: #e0e0e0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.job-card .meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
  font-size: 10px;
}
.job-card .amount {
  color: #00ff41;
  font-weight: 600;
}
.job-card .confidence-badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 600;
}
.confidence-high { background: #00ff4120; color: #00ff41; }
.confidence-mid { background: #ffd70020; color: #ffd700; }
.confidence-low { background: #ff444420; color: #ff4444; }

.job-card .time-ago {
  font-size: 9px;
  color: #555;
  margin-top: 3px;
}

/* Progress bar for printing */
.progress-bar-outer {
  width: 100%;
  height: 4px;
  background: #1a1a2e;
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, #00d4ff, #00ff41);
  border-radius: 2px;
  transition: width 1s linear;
  box-shadow: 0 0 8px #00d4ff60;
}

/* ─── Detail Panel ─── */
.detail-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #333;
  gap: 8px;
}
.detail-empty .icon { font-size: 32px; opacity: 0.3; }
.detail-empty .text { font-size: 11px; letter-spacing: 1px; }

.detail-content {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Geometry Info */
.geometry-info {
  background: #0d1117;
  border: 1px solid #1a1a2e;
  border-radius: 4px;
  padding: 12px;
}
.geometry-info .geo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.geometry-info .geo-title {
  font-size: 10px;
  font-weight: 600;
  color: #00d4ff;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.geo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.geo-stat {
  text-align: center;
}
.geo-stat .label {
  font-size: 8px;
  color: #555;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.geo-stat .value {
  font-size: 14px;
  font-weight: 600;
  color: #e0e0e0;
  margin-top: 2px;
}
.bounding-box-display {
  margin-top: 10px;
  padding: 8px;
  background: #0a0a0a;
  border: 1px solid #1a1a2e;
  border-radius: 3px;
  text-align: center;
}
.bounding-box-display .dims {
  font-size: 16px;
  font-weight: 700;
  color: #00d4ff;
  letter-spacing: 2px;
}
.bounding-box-display .dims-label {
  font-size: 8px;
  color: #555;
  letter-spacing: 1px;
  margin-top: 2px;
}

/* Decision & Payment Badges */
.badges-row {
  display: flex;
  gap: 8px;
}
.badge {
  padding: 4px 12px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  flex: 1;
  text-align: center;
}
.badge-accepted { background: #00ff4118; color: #00ff41; border: 1px solid #00ff4130; }
.badge-conditional { background: #ffd70018; color: #ffd700; border: 1px solid #ffd70030; }
.badge-rejected { background: #ff444418; color: #ff4444; border: 1px solid #ff444430; }
.badge-paid { background: #7c3aed18; color: #a78bfa; border: 1px solid #7c3aed30; }
.badge-pending { background: #ffd70018; color: #ffd700; border: 1px solid #ffd70030; }
.badge-failed { background: #ff444418; color: #ff4444; border: 1px solid #ff444430; }

/* Donut Chart */
.cost-breakdown {
  background: #0d1117;
  border: 1px solid #1a1a2e;
  border-radius: 4px;
  padding: 12px;
}
.cost-title {
  font-size: 10px;
  font-weight: 600;
  color: #00d4ff;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.cost-chart-row {
  display: flex;
  align-items: center;
  gap: 16px;
}
.donut-container {
  width: 100px;
  height: 100px;
  flex-shrink: 0;
}
.cost-legend {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.legend-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 10px;
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  margin-right: 6px;
  flex-shrink: 0;
}
.legend-label {
  flex: 1;
  color: #888;
}
.legend-value {
  font-weight: 600;
  color: #c0c0c0;
}

/* Reasoning Terminal */
.reasoning-box {
  background: #0a0a0a;
  border: 1px solid #1a1a2e;
  border-radius: 4px;
  padding: 12px;
  max-height: 160px;
  overflow-y: auto;
}
.reasoning-title {
  font-size: 10px;
  font-weight: 600;
  color: #00ff41;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.reasoning-title .blink {
  display: inline-block;
  width: 6px;
  height: 12px;
  background: #00ff41;
  animation: blink 1s step-end infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
.reasoning-text {
  font-size: 11px;
  color: #888;
  line-height: 1.6;
  white-space: pre-wrap;
}

/* ─── Bottom Row ─── */
.bottom-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  border-bottom: 1px solid #1a1a2e;
  overflow: hidden;
}

/* Notifications */
.notifications-panel {
  border-right: 1px solid #1a1a2e;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.notif-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid #1a1a2e;
  background: #0d1117;
  flex-shrink: 0;
}
.notif-title {
  font-size: 10px;
  font-weight: 600;
  color: #00d4ff;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.notif-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 10px;
}
.notif-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 3px;
  transition: background 0.15s;
  font-size: 11px;
  border-bottom: 1px solid #111;
}
.notif-item:hover { background: #0d1117; }
.notif-icon { flex-shrink: 0; font-size: 12px; margin-top: 1px; }
.notif-text { flex: 1; color: #999; }
.notif-time { font-size: 9px; color: #444; white-space: nowrap; margin-top: 1px; }
.notif-item.type-info .notif-text { color: #00d4ff; }
.notif-item.type-warning .notif-text { color: #ffd700; }
.notif-item.type-success .notif-text { color: #00ff41; }
.notif-item.type-error .notif-text { color: #ff4444; }

/* Chat Widget */
.chat-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid #1a1a2e;
  background: #0d1117;
  flex-shrink: 0;
}
.chat-title {
  font-size: 10px;
  font-weight: 600;
  color: #00ff41;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.chat-msg {
  font-size: 11px;
  line-height: 1.5;
}
.chat-msg.user { color: #00d4ff; }
.chat-msg.user::before { content: '$ '; color: #555; }
.chat-msg.agent { color: #00ff41; padding-left: 14px; opacity: 0.85; }
.chat-msg.agent::before { content: '→ '; color: #333; }
.chat-msg.system { color: #444; font-style: italic; font-size: 10px; }
.chat-input-row {
  display: flex;
  align-items: center;
  border-top: 1px solid #1a1a2e;
  background: #0d1117;
  padding: 0 12px;
  flex-shrink: 0;
}
.chat-prompt-char {
  color: #00ff41;
  font-weight: 700;
  margin-right: 6px;
  font-size: 12px;
}
.chat-input {
  flex: 1;
  background: transparent;
  border: none;
  color: #e0e0e0;
  font-family: inherit;
  font-size: 11px;
  padding: 8px 0;
  outline: none;
}
.chat-input::placeholder { color: #333; }

/* ─── Status Bar ─── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: #0d1117;
  border-top: 1px solid #1a1a2e;
  font-size: 10px;
  color: #555;
}
.status-bar .status-group {
  display: flex;
  align-items: center;
  gap: 20px;
}
.status-item {
  display: flex;
  align-items: center;
  gap: 5px;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.status-dot.green { background: #00ff41; box-shadow: 0 0 6px #00ff4180; }
.status-dot.yellow { background: #ffd700; box-shadow: 0 0 6px #ffd70080; }
.status-dot.red { background: #ff4444; box-shadow: 0 0 6px #ff444480; }

/* ─── Animations ─── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeIn 0.2s ease-out; }

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 4px #00d4ff20; }
  50% { box-shadow: 0 0 12px #00d4ff40; }
}
.printing-card { animation: pulse-glow 2s ease-in-out infinite; }

/* Scanline overlay */
#app::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    #00000008 2px,
    #00000008 4px
  );
  pointer-events: none;
  z-index: 9999;
}
</style>
</head>

  <header class="top-bar">
    <div class="brand">
      <div class="brand-name">THE CUSTOM PARTS BUREAU</div>

</div>

                const realIds = new Set(data.jobs.map(j => j.id));

                jobs = [...data.jobs, ...filteredMockJobs];
                
                // Do same for notifications
                const newNotifs = data.notifications || [];
                notifications = [...newNotifs, ...mockNotifications];
            } else {
                jobs = data.jobs;
                notifications = data.notifications || [];
            }
        }
        return true;
    } catch (err) {
        console.warn('Failed to fetch dashboard data, using mock data:', err);
        return false;
    } finally {
        fetchInProgress = false;
    }
}

  const now = new Date();
  const then = new Date(dateStr);
  const diffMs = now - then;
  if (isNaN(diffMs) || diffMs < 0) return "Just now";
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return "Just now";
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.floor(diffMin / 60);
  return `${diffHr}h ${diffMin % 60}m ago`;
}

      <div class="metric-spark">
        ${sparkData.map(v => `<div class="bar" style="height:${Math.max(2, (v / maxSpark) * 16)}px"></div>`).join('')}
      </div>
    </div>
    <div class="metric">
      <span class="metric-label">Avg Margin</span>
      <span class="metric-value ${avgMargin >= 30 ? 'green' : avgMargin >= 15 ? 'yellow' : ''}">${avgMargin.toFixed(1)}%</span>
    </div>
    <div class="metric">
      <span class="metric-label">Parts Shipped</span>
      <span class="metric-value cyan">${shipped}</span>
    </div>
  `;
}

// ─── Kanban ───
function renderKanban() {
  const columns = {
    paid: jobs.filter(j => j.status === 'paid'),
    printing: jobs.filter(j => j.status === 'printing'),
    completed: jobs.filter(j => j.status === 'completed'),
    on_hold: jobs.filter(j => j.status === 'on_hold'),
  };

  document.getElementById('queue-count').textContent = `${jobs.length} jobs total`;
  document.getElementById('status-queue-count').textContent = columns.paid.length;

  const kanban = document.getElementById('kanban');
  kanban.innerHTML = `
    <div class="kanban-col col-paid">
      <div class="kanban-col-header">Paid — Ready <span class="count">${columns.paid.length}</span></div>
      <div class="kanban-cards">${columns.paid.map(j => renderCard(j)).join('')}</div>
    </div>
    <div class="kanban-col col-printing">
      <div class="kanban-col-header">Printing <span class="count">${columns.printing.length}</span></div>
      <div class="kanban-cards">${columns.printing.map(j => renderCard(j, true)).join('')}</div>
    </div>
    <div class="kanban-col col-completed">
      <div class="kanban-col-header">Completed <span class="count">${columns.completed.length}</span></div>
      <div class="kanban-cards">${columns.completed.map(j => renderCard(j)).join('')}</div>
    </div>
    <div class="kanban-col col-hold">
      <div class="kanban-col-header">On Hold <span class="count">${columns.on_hold.length}</span></div>
      <div class="kanban-cards">${columns.on_hold.map(j => renderCard(j)).join('')}</div>
    </div>
  `;
}

function renderCard(job, isPrinting = false) {
  const selected = job.id === selectedJobId ? 'selected' : '';
  const printingClass = isPrinting ? 'printing-card' : '';
  const progress = isPrinting ? `
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" style="width:${job.print_progress}%"></div>
    </div>
    <div style="font-size:9px;color:#00d4ff;margin-top:3px;">${job.print_progress}% — ETA ${job.print_eta}</div>
  ` : '';
  const rejectedTag = job.decision === 'REJECTED' ? '<span style="color:#ff4444;font-size:9px;"> ✗ REFUNDED</span>' : '';

  return `
    <div class="job-card ${selected} ${printingClass}" data-id="${job.id}" onclick="selectJob('${job.id}')">
      <div class="filename">${job.filename}${rejectedTag}</div>
      <div class="meta">
        <span class="amount">${job.total_usd > 0 ? '$' + job.total_usd.toFixed(2) : '—'}</span>
        <span class="confidence-badge ${getConfidenceClass(job.confidence)}">${job.confidence.toFixed(1)}</span>
      </div>
      <div class="time-ago">${getTimeAgo(job.paid_at || job.created_at)}</div>
      ${progress}
    </div>
  `;
}

// ─── Detail Panel ───
function selectJob(jobId) {
  selectedJobId = jobId;
  const job = jobs.find(j => j.id === jobId);
  if (!job) return;

  lastRenderedJobState = `${job.status}-${job.print_progress}-${job.payment_status}-${job.reasoning ? job.reasoning.length : 0}`;

  renderKanban(); // re-render to update selection

  document.getElementById('detail-job-id').textContent = job.id;

  // Decision badge
  const decisionClass = job.decision === 'ACCEPTED' ? 'badge-accepted' :
                         job.decision === 'CONDITIONAL' ? 'badge-conditional' : 'badge-rejected';
  const decisionLabel = job.decision === 'ACCEPTED' ? '✓ ACCEPTED' :
                         job.decision === 'CONDITIONAL' ? '⚠ CONDITIONAL' : '✗ REJECTED';

  // Payment badge
  const payClass = job.payment_status === 'paid' ? 'badge-paid' :
                   job.payment_status === 'refunded' ? 'badge-failed' : 'badge-pending';
  const payIcon = job.payment_status === 'paid' ? '✓' : job.payment_status === 'refunded' ? '↩' : '…';

  // Donut chart SVG
  const donutSVG = renderDonut(job);

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-content animate-in">
      <!-- Badges -->
      <div class="badges-row">
        <div class="badge ${decisionClass}">${decisionLabel}</div>
        <div class="badge ${payClass}">STRIPE ${payIcon} ${job.payment_status.toUpperCase()}</div>
      </div>

      <!-- Geometry -->
      <div class="geometry-info">
        <div class="geo-header">
          <span class="geo-title">Geometry Analysis</span>
          <span style="font-size:9px;color:#555;">${job.filename}</span>
        </div>
        <div class="geo-grid">
          <div class="geo-stat">
            <div class="label">Volume</div>
            <div class="value">${job.volume_cm3} cm³</div>
          </div>
          <div class="geo-stat">
            <div class="label">Triangles</div>
            <div class="value">${job.triangles.toLocaleString()}</div>
          </div>
          <div class="geo-stat">
            <div class="label">Min Wall</div>
            <div class="value" style="color:${job.min_wall_mm < 0.8 ? '#ff4444' : '#00ff41'}">${job.min_wall_mm}mm</div>
          </div>
          <div class="geo-stat">
            <div class="label">Overhang</div>
            <div class="value" style="color:${job.overhang_pct > 30 ? '#ff4444' : job.overhang_pct > 15 ? '#ffd700' : '#00ff41'}">${job.overhang_pct}%</div>
          </div>
          <div class="geo-stat">
            <div class="label">Confidence</div>
            <div class="value" style="color:${job.confidence >= 70 ? '#00ff41' : job.confidence >= 30 ? '#ffd700' : '#ff4444'}">${job.confidence.toFixed(1)}</div>
          </div>
          <div class="geo-stat">
            <div class="label">Total</div>
            <div class="value" style="color:#00ff41">$${job.total_usd.toFixed(2)}</div>
          </div>
        </div>
        <div class="bounding-box-display">
          <div class="dims">${job.bounding_box} mm</div>
          <div class="dims-label">BOUNDING BOX</div>
        </div>
      </div>

      <!-- Cost Breakdown -->
      <div class="cost-breakdown">
        <div class="cost-title">Cost Breakdown</div>
        <div class="cost-chart-row">
          <div class="donut-container">${donutSVG}</div>
          <div class="cost-legend">
            <div class="legend-item">
              <span class="legend-dot" style="background:#00d4ff"></span>
              <span class="legend-label">Material</span>
              <span class="legend-value">$${job.material_usd.toFixed(2)}</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#7c3aed"></span>
              <span class="legend-label">Machine</span>
              <span class="legend-value">$${job.machine_usd.toFixed(2)}</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#ffd700"></span>
              <span class="legend-label">Support</span>
              <span class="legend-value">$${job.support_usd.toFixed(2)}</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#00ff41"></span>
              <span class="legend-label">Margin</span>
              <span class="legend-value">$${job.margin_usd.toFixed(2)} <span style="color:#555">(${job.margin_pct.toFixed(1)}%)</span></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Reasoning -->
      <div class="reasoning-box">
        <div class="reasoning-title">
          <span>Nemotron 3 Ultra Reasoning</span>
          <span class="blink"></span>
        </div>
        <div class="reasoning-text">${job.reasoning}</div>
      </div>
    </div>
  `;
}

function renderDonut(job) {
  const total = job.material_usd + job.machine_usd + job.support_usd + job.margin_usd;
  if (total === 0) {
    return `<svg viewBox="0 0 100 100" width="100" height="100">
      <circle cx="50" cy="50" r="40" fill="none" stroke="#1a1a2e" stroke-width="15"/>
      <text x="50" y="54" text-anchor="middle" fill="#555" font-size="10" font-family="JetBrains Mono">N/A</text>
    </svg>`;
  }

  const segments = [
    { value: job.material_usd, color: '#00d4ff' },
    { value: job.machine_usd, color: '#7c3aed' },
    { value: job.support_usd, color: '#ffd700' },
    { value: job.margin_usd, color: '#00ff41' },
  ];

  const circumference = 2 * Math.PI * 40;
  let offset = 0;
  let arcs = '';

  for (const seg of segments) {
    const pct = seg.value / total;
    const len = pct * circumference;
    arcs += `<circle cx="50" cy="50" r="40" fill="none"
      stroke="${seg.color}" stroke-width="15"
      stroke-dasharray="${len} ${circumference - len}"
      stroke-dashoffset="${-offset}"
      transform="rotate(-90 50 50)"
      style="opacity:0.85"/>`;
    offset += len;
  }

  return `<svg viewBox="0 0 100 100" width="100" height="100">
    ${arcs}
    <circle cx="50" cy="50" r="30" fill="#0d1117"/>
    <text x="50" y="48" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="700" font-family="JetBrains Mono">$${total.toFixed(2)}</text>
    <text x="50" y="60" text-anchor="middle" fill="#555" font-size="7" font-family="JetBrains Mono">TOTAL</text>
  </svg>`;
}

// ─── Notifications ───
function renderNotifications() {
  const list = document.getElementById('notif-list');
  document.getElementById('notif-count').textContent = `${notifications.length} events`;
  // Render most recent first
  list.innerHTML = [...notifications].reverse().map(n => `
    <div class="notif-item type-${n.type}">
      <span class="notif-icon">${n.icon}</span>
      <span class="notif-text">${n.text}</span>
      <span class="notif-time">${n.time}</span>
    </div>
  `).join('');
}

// ─── Chat ───
function initChat() {
  const messages = document.getElementById('chat-messages');
  const input = document.getElementById('chat-input');

  // Initial messages
  addChatMessage('system', 'Hermes Agent console initialized. Nemotron 3 Ultra online.');
  addChatMessage('system', 'Type "help" for available queries.');

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && input.value.trim()) {
      const query = input.value.trim().toLowerCase();
      addChatMessage('user', input.value.trim());
      input.value = '';

      // Find best matching response
      setTimeout(() => {
        let response = null;
        for (const [key, val] of Object.entries(chatResponses)) {
          if (query.includes(key)) {
            response = val;
            break;
          }
        }

        // Check if asking about a specific job
        if (!response) {
          const matchedJob = jobs.find(j => query.includes(j.filename.replace('.stl', '').toLowerCase()));
          if (matchedJob) {
            response = `${matchedJob.filename} — ${matchedJob.decision}\nConfidence: ${matchedJob.confidence}/100 | Total: $${matchedJob.total_usd.toFixed(2)}\nStatus: ${matchedJob.status} | Margin: ${matchedJob.margin_pct}%\nBounding box: ${matchedJob.bounding_box} mm | Wall: ${matchedJob.min_wall_mm}mm`;
          }
        }

        if (!response) {
          response = 'Query not recognized. Type "help" to see available commands.';
        }

        addChatMessage('agent', response);
      }, 300 + Math.random() * 400);
    }
  });
}

function addChatMessage(type, text) {
  const messages = document.getElementById('chat-messages');
  const lines = text.split('\n');
  for (const line of lines) {
    const div = document.createElement('div');
    div.className = `chat-msg ${type}`;
    div.textContent = line;
    messages.appendChild(div);
  }
  messages.scrollTop = messages.scrollHeight;
}

// ─── Simulated Progress ───
function simulateProgress() {
  const printingJob = jobs.find(j => j.status === 'printing');
  if (printingJob && printingJob.print_progress < 100) {
    printingJob.print_progress = Math.min(100, printingJob.print_progress + 1);
    if (printingJob.print_progress >= 100) {
      printingJob.status = 'completed';
      printingJob.print_eta = '';
      notifications.push({
        type: 'success',
        icon: '✅',
        text: `${printingJob.filename} print complete! Ready for shipping.`,
        time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false })
      });
      renderNotifications();
    } else {
      const minLeft = Math.round((100 - printingJob.print_progress) * 0.68);
      printingJob.print_eta = `${minLeft}min`;
      document.getElementById('status-current-job').textContent =
        `${printingJob.filename} — ETA ${printingJob.print_eta} — ${printingJob.print_progress}%`;
    }

    // Update kanban cards if visible
    renderKanban();
    if (selectedJobId === printingJob.id) {
      selectJob(printingJob.id);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

function init() {
  // Initial data fetch
  refreshData().then(() => {
    // Auto-select the printing job or first job
    const printingJob = jobs.find(j => j.status === 'printing');
    if (printingJob) {
      selectJob(printingJob.id);
    } else if (jobs.length > 0) {
      selectJob(jobs[0].id);
    }
  });

  // Initialize Chat handlers
  initChat();

  // Simulate printing progress every 8 seconds
  setInterval(simulateProgress, 8000);
  // Fetch live data every 2 seconds
  setInterval(refreshData, 2000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
